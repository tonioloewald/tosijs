name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Fast, reliable: the happy-dom unit suite. This gates the build.
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test

  # Real-browser regression lane (behaviors happy-dom can't exercise: composed-
  # event retargeting across shadow roots, spec-correct <template> cloning,
  # getComputedStyle resolving derived CSS custom properties). Runs the doc
  # `test` fences via haltija-Electron under xvfb — no Playwright.
  #
  # continue-on-error while the Linux/Electron/mkcert setup is being proven in
  # real CI; flip to blocking once it's reliably green (see TODO / CI notes).
  browser:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: System deps (xvfb, Electron runtime libs, mkcert)
        run: |
          sudo apt-get update
          # Electron runtime libs + a virtual display. Package names target
          # ubuntu-latest (24.04); libasound2t64 replaced libasound2 there.
          sudo apt-get install -y \
            xvfb libnss3-tools \
            libgtk-3-0 libnotify4 libnss3 libxss1 libasound2t64 libgbm1 \
            libatk-bridge2.0-0 libatk1.0-0 libdrm2 libxcomposite1 libxdamage1 \
            libxrandr2 libxkbcommon0 libpango-1.0-0 libcairo2
          curl -JLsO "https://dl.filippo.io/mkcert/latest?for=linux/amd64"
          chmod +x mkcert-v*-linux-amd64
          sudo mv mkcert-v*-linux-amd64 /usr/local/bin/mkcert

      - name: Trust store + dev TLS cert (dev server serves HTTPS on :8018)
        run: |
          mkcert -install
          bun run tls

      # Persistent virtual display so Electron survives across steps.
      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1280x1024x24 >/tmp/xvfb.log 2>&1 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
          sleep 2

      # Pre-provision haltija in Electron CI mode (sandbox off, waits for ready)
      # so the dev-server test lane ADOPTS it instead of spawning `bunx haltija
      # -f` (plain desktop app), which does not come up under xvfb within the
      # dev server's 10s launch timeout. Root cause: tosijs-ui#18 — the test
      # lane should request --ci/--private itself; this pre-provision is the
      # workaround until it does.
      - name: Pre-provision haltija (Electron CI mode)
        run: |
          bunx haltija --ci >/tmp/haltija.log 2>&1 &
          for i in $(seq 1 60); do
            if hj windows >/dev/null 2>&1; then echo "haltija reachable"; break; fi
            sleep 1
          done
          hj windows || { echo "haltija never came up"; cat /tmp/haltija.log; exit 1; }

      - name: Browser doc-test lane
        run: bun bin/site.ts --test
